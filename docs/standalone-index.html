<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Side Quest — Every event deserves a deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600;700&family=Orbitron:wght@500;700&family=Rajdhani:wght@500;600;700&family=Pirata+One&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #08070d; }
  input, textarea { outline: none; }
  input::placeholder, textarea::placeholder { color: #6c6c78; }
  .ql-spin { border: 3px solid; border-radius: 50%; animation: qlspin .8s linear infinite; }
  @keyframes qlspin { to { transform: rotate(360deg) } }
  .ql-fade { animation: qlfade .6s ease both; }
  @keyframes qlfade { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: none } }
  @keyframes qlfloat { 0%,100% { transform: translateY(0) rotate(var(--r)) } 50% { transform: translateY(-22px) rotate(var(--r)) } }
  .ql-pop { animation: qlpop .45s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes qlpop { from { opacity: 0; transform: scale(.92) translateY(14px) } to { opacity: 1; transform: none } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ===========================================================================
   SIDE QUEST — standalone single-file build.
   Runs by double-clicking this file or hosting it statically (Netlify/Vercel/
   GitHub Pages/S3) for a real public URL.

   LORE: tries a live Claude call if window.SIDE QUEST_API_KEY is set (e.g. for
   local testing); otherwise gracefully uses a name-matched fallback deck so a
   hosted static page is fully demoable. In production, replace callClaude()
   with a fetch to YOUR backend (see the backend spec). Search "API SEAM".
   ART: procedural themed placeholder (the nano-banana seam). Search "ART SEAM".
=========================================================================== */

const EVENT_TYPES = [
  { id: "bachelor", label: "Bachelor / Bachelorette", icon: "\u265b", hint: "Send the guest of honor on a legendary quest." },
  { id: "trip", label: "Group Trip", icon: "\u2708", hint: "A campaign across cities and days." },
  { id: "party", label: "House Party", icon: "\u2726", hint: "Roles, missions and mischief for every guest." },
  { id: "drinking", label: "Drinking Game", icon: "\u2691", hint: "Draw a card, do the thing. Chaos as a service." },
  { id: "wedding", label: "Wedding", icon: "\u2661", hint: "Icebreakers and quests for the whole crowd." },
  { id: "corporate", label: "Team Offsite", icon: "\u25c8", hint: "Forced fun, but actually good for once." },
];

const THEMES = [
  { id: "starwars", label: "Galactic Saga", sub: "Star Wars-ish", style: "scifi", swatch: ["#0b0f1a","#f7c948","#3aa0ff"], bg: ["#05070f","#0d1830"], accent: "#f7c948", ink: "#eaf2ff", displayFont: "'Orbitron', sans-serif", bodyFont: "'Rajdhani', sans-serif", corner: 6, ornament: "\u25b0" },
  { id: "lotr", label: "Realm of Rings", sub: "High-fantasy-ish", style: "fantasy", swatch: ["#1c2415","#c9a227","#6b8e3a"], bg: ["#13160c","#241c0c"], accent: "#c9a227", ink: "#f3ead0", displayFont: "'Cinzel', serif", bodyFont: "'EB Garamond', serif", corner: 14, ornament: "\u2766" },
  { id: "potter", label: "School of Spells", sub: "Wizarding-ish", style: "arcane", swatch: ["#1a1224","#b8860b","#7b2d8e"], bg: ["#100a1c","#241038"], accent: "#caa75a", ink: "#f0e6ff", displayFont: "'Cinzel Decorative', serif", bodyFont: "'EB Garamond', serif", corner: 12, ornament: "\u2726" },
  { id: "onepiece", label: "Grand Voyage", sub: "Pirate-adventure-ish", style: "adventure", swatch: ["#0a1c2e","#e63946","#f4a261"], bg: ["#08243a","#0d3a4f"], accent: "#f4a261", ink: "#fff6e8", displayFont: "'Pirata One', cursive", bodyFont: "'Outfit', sans-serif", corner: 10, ornament: "\u2620" },
  { id: "cyber", label: "Neon Districts", sub: "Cyberpunk-ish", style: "cyber", swatch: ["#0d0221","#ff2a6d","#05d9e8"], bg: ["#07021a","#1a0438"], accent: "#05d9e8", ink: "#eafcff", displayFont: "'Orbitron', sans-serif", bodyFont: "'Rajdhani', sans-serif", corner: 2, ornament: "\u25e2" },
  { id: "noir", label: "Smoke & Shadows", sub: "Detective-noir-ish", style: "noir", swatch: ["#15171a","#c0a062","#8a8d91"], bg: ["#0c0d0f","#1a1c20"], accent: "#c0a062", ink: "#ece8df", displayFont: "'Cinzel', serif", bodyFont: "'EB Garamond', serif", corner: 4, ornament: "\u271c" },
];

const CARD_FRAMES = [
  { key: "gold", accent: "#f3cf5b" }, { key: "azure", accent: "#56c4ef" },
  { key: "crimson", accent: "#ef5b6b" }, { key: "verdant", accent: "#5bef82" },
  { key: "violet", accent: "#b15bef" },
];

const STEPS = ["Event", "World", "Quest", "Cast", "Reveal", "Order"];
const UI_FONT = "'Outfit', 'Segoe UI', sans-serif";
const DISPLAY_FONT = "'Cinzel', Georgia, serif";

const DEMO = {
  eventType: "bachelor", theme: "lotr",
  questPrompt: "Dave's bachelor party in the mountains. The fellowship must complete dares to 'earn back' his freedom before the wedding. Dave fears seagulls, loves terrible karaoke, and once lost a shoe in a fountain. Make everyone a legendary hero with a ridiculous title.",
  participants: [
    { id: 1, name: "Dave", photo: null }, { id: 2, name: "Marco", photo: null },
    { id: 3, name: "Liam", photo: null }, { id: 4, name: "Sofia", photo: null },
    { id: 5, name: "Theo", photo: null },
  ],
};

// Fallback deck — also remapped onto the user's real names when live lore is unavailable.
const FALLBACK = {
  questCard: { title: "The Last Free Night", typeLine: "Quest", ability: "The fellowship must complete every hero's dare before dawn to earn back Dave's freedom. If even one quest goes unfinished, the whole party drinks at the wedding toast.", flavor: "One does not simply walk into matrimony." },
  cards: [
    { title: "Soon-to-be-Bound", typeLine: "Legendary Creature — Groom Champion", cost: 7, power: 4, toughness: 6, ability: "At the start of each round, attempt a karaoke ballad; if you refuse, lose one shoe.", flavor: "He feared no man. Only seagulls.", frame: "gold" },
    { title: "Keeper of the Itinerary", typeLine: "Legendary Creature — Planner Sage", cost: 5, power: 3, toughness: 5, ability: "Tap to reveal the next dare; everyone groans but obeys.", flavor: "I had a spreadsheet for this exact emergency.", frame: "azure" },
    { title: "The Unrelenting", typeLine: "Legendary Creature — Reveler Berserker", cost: 4, power: 6, toughness: 2, ability: "Whenever a round ends early, declare 'one more' and the round does not end.", flavor: "Sleep is a side quest.", frame: "crimson" },
    { title: "Voice of Reason", typeLine: "Legendary Creature — Diplomat Cleric", cost: 4, power: 2, toughness: 7, ability: "Once per night, cancel one terrible idea before it costs anyone a deposit.", flavor: "Someone has to remember the hotel name.", frame: "verdant" },
    { title: "Hidden Flask", typeLine: "Legendary Creature — Trickster Rogue", cost: 3, power: 5, toughness: 3, ability: "Always has exactly what the quest requires, no questions asked.", flavor: "Don't ask where it came from.", frame: "violet" },
  ],
};

// --------- LORE (API SEAM) ---------
async function generateDeckLore({ eventType, theme, questPrompt, participants }) {
  const key = (typeof window !== "undefined") && window.SIDE QUEST_API_KEY;
  // In production, replace this whole branch with: fetch('/api/decks/:id/generate-lore')
  if (!key) return fallbackFor(participants);
  try {
    const ev = EVENT_TYPES.find((e) => e.id === eventType)?.label || eventType;
    const th = THEMES.find((t) => t.id === theme)?.label || theme;
    const names = participants.map((p) => p.name || "Hero").join(", ");
    const prompt = `You are the loremaster for "Side Quest". EVENT: ${ev}. THEME: ${th}. GOAL: "${questPrompt}". PARTICIPANTS (exact names): ${names}. For each, invent {realName,title,typeLine,cost(1-7),power(0-9),toughness(0-9),ability(event-tied,1 sentence),flavor(<=18 words),frame(gold|azure|crimson|verdant|violet)}. Also one questCard {title,typeLine:"Quest",ability(2 sentences),flavor}. Return ONLY JSON {"questCard":{...},"cards":[...]} with cards in the same order.`;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 2500, messages: [{ role: "user", content: prompt }] }),
    });
    if (!res.ok) throw new Error("api");
    const data = await res.json();
    const text = (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
    return JSON.parse(text.replace(/```json/gi, "").replace(/```/g, "").trim());
  } catch (e) {
    return fallbackFor(participants);
  }
}

function fallbackFor(participants) {
  const names = participants.map((p) => p.name || "Hero");
  const cards = names.map((nm, i) => {
    const base = FALLBACK.cards[i % FALLBACK.cards.length];
    return { ...base, realName: nm, title: nm + ", " + base.title };
  });
  return { questCard: FALLBACK.questCard, cards };
}

// --------- ART (ART SEAM): procedural themed placeholder ---------
function hashStr(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return Math.abs(h >>> 0); }

async function generateCardArt({ photoBase64, frameAccent, themeStyle, seedStr }) {
  await new Promise((r) => setTimeout(r, 450 + Math.random() * 500));
  const svg = makeArt(seedStr, frameAccent, themeStyle, photoBase64);
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

function makeArt(seedStr, accent, style, photo) {
  const r = (n) => (hashStr(seedStr + n) % 1000) / 1000;
  let bg = "#0a0a12", shapes = "";
  const blob = (i, op) => { const cx = 30 + r("x"+i)*240, cy = 30 + r("y"+i)*180, rad = 24 + r("r"+i)*80; return `<circle cx="${cx}" cy="${cy}" r="${rad}" fill="${i%2?accent:"#fff"}" opacity="${op}"/>`; };
  if (style === "cyber" || style === "scifi") { bg = "#06061a"; for (let i=0;i<9;i++){const y=20+i*26; shapes+=`<line x1="0" y1="${y}" x2="300" y2="${y}" stroke="${accent}" stroke-width="0.6" opacity="0.18"/>`;} for (let i=0;i<5;i++) shapes+=blob(i,0.22+r("o"+i)*0.25); }
  else if (style === "noir") { bg = "#101113"; shapes += `<rect width="300" height="240" fill="url(#vg)"/>`; for (let i=0;i<4;i++){const x=r("b"+i)*300; shapes+=`<rect x="${x}" y="0" width="${30+r("w"+i)*50}" height="240" fill="#000" opacity="0.25"/>`;} }
  else if (style === "arcane") { bg = "#120a22"; for (let i=0;i<22;i++){const x=r("sx"+i)*300,y=r("sy"+i)*240,s=0.6+r("ss"+i)*1.8; shapes+=`<circle cx="${x}" cy="${y}" r="${s}" fill="${accent}" opacity="${0.4+r("so"+i)*0.5}"/>`;} for (let i=0;i<4;i++) shapes+=blob(i,0.2); }
  else if (style === "adventure") { bg = "#08283a"; for (let i=0;i<6;i++){const y=90+i*26; shapes+=`<path d="M0 ${y} Q75 ${y-16} 150 ${y} T300 ${y}" stroke="${accent}" stroke-width="2" fill="none" opacity="${0.3-i*0.03}"/>`;} for (let i=0;i<4;i++) shapes+=blob(i,0.25); }
  else { bg = "#161208"; for (let i=0;i<7;i++) shapes+=blob(i,0.18+r("o"+i)*0.4); }
  const photoLayer = photo ? `<image href="${photo}" x="0" y="0" width="300" height="240" preserveAspectRatio="xMidYMid slice" opacity="0.5"/>` : `<g opacity="0.8"><ellipse cx="150" cy="115" rx="40" ry="46" fill="${accent}"/><path d="M75 240 Q150 150 225 240 Z" fill="${accent}"/></g>`;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="300" height="240" viewBox="0 0 300 240"><defs><radialGradient id="vg" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="${accent}" stop-opacity="0.25"/><stop offset="100%" stop-color="#000" stop-opacity="0.7"/></radialGradient></defs><rect width="300" height="240" fill="${bg}"/>${shapes}${photoLayer}<rect width="300" height="240" fill="url(#vg)" opacity="0.35"/></svg>`;
}

// --------- UI PRIMITIVES ---------
function PrimaryButton({ children, onClick, disabled, style }) {
  return <button onClick={onClick} disabled={disabled} style={{ fontFamily: UI_FONT, fontSize: 15, fontWeight: 600, letterSpacing: 0.3, padding: "13px 28px", borderRadius: 10, border: "1px solid #f3cf5b", cursor: disabled ? "not-allowed" : "pointer", color: disabled ? "#6c6c78" : "#1a1206", background: disabled ? "#2a2a32" : "linear-gradient(180deg,#f7d978,#d8b24a)", boxShadow: disabled ? "none" : "0 6px 20px rgba(216,178,74,0.25)", ...style }}>{children}</button>;
}
function GhostButton({ children, onClick, style }) {
  return <button onClick={onClick} style={{ fontFamily: UI_FONT, fontSize: 14, padding: "11px 20px", borderRadius: 10, border: "1px solid #4a4a56", cursor: "pointer", color: "#c8c8d4", background: "transparent", ...style }}>{children}</button>;
}
const inputStyle = { width: "100%", boxSizing: "border-box", padding: "13px 15px", borderRadius: 10, border: "1px solid #3a3a46", background: "rgba(255,255,255,0.03)", color: "#f0f0f6", fontFamily: UI_FONT, fontSize: 15, marginBottom: 4 };

function Stepper({ step }) {
  return <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap", justifyContent: "center" }}>
    {STEPS.map((s, i) => <div key={s} style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ fontFamily: UI_FONT, fontSize: 11, letterSpacing: 0.5, textTransform: "uppercase", padding: "4px 10px", borderRadius: 999, border: `1px solid ${i<=step?"#d8b24a":"#3a3a44"}`, color: i<=step?"#f3cf5b":"#6c6c78", background: i===step?"rgba(216,178,74,0.12)":"transparent", whiteSpace: "nowrap" }}>{s}</div>
      {i < STEPS.length-1 && <div style={{ width: 14, height: 1, background: i<step?"#d8b24a":"#3a3a44" }} />}
    </div>)}
  </div>;
}

function GameCard({ card, theme, art, loadingArt, flipped, onFlip, onRegenLore, onRegenArt, busy }) {
  const fr = CARD_FRAMES.find((f) => f.key === card.frame) || CARD_FRAMES[0];
  const t = theme, W = 232, scale = W/300, corner = (t.corner||10)*scale;
  return <div style={{ width: W, perspective: 1200 }}>
    <div onClick={onFlip} style={{ position: "relative", width: "100%", height: 340, transformStyle: "preserve-3d", transition: "transform .7s cubic-bezier(.2,.8,.2,1)", transform: flipped?"rotateY(0deg)":"rotateY(180deg)", cursor: "pointer" }}>
      <div style={{ position: "absolute", inset: 0, backfaceVisibility: "hidden", transform: "rotateY(180deg)", borderRadius: corner, background: `linear-gradient(160deg, ${t.bg[1]}, ${t.bg[0]})`, border: `2px solid ${t.accent}`, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 10 }}>
        <div style={{ fontSize: 40*scale, color: t.accent }}>{t.ornament}</div>
        <div style={{ fontFamily: t.displayFont, color: t.accent, letterSpacing: 4, fontSize: 13*scale, textTransform: "uppercase" }}>Side Quest</div>
        <div style={{ fontFamily: UI_FONT, color: t.ink, opacity: 0.5, fontSize: 10*scale }}>tap to reveal</div>
      </div>
      <div style={{ position: "absolute", inset: 0, backfaceVisibility: "hidden", borderRadius: corner, padding: 10*scale, background: `linear-gradient(160deg, ${t.bg[1]}, ${t.bg[0]})`, border: `2px solid ${fr.accent}`, color: t.ink, fontFamily: t.bodyFont, display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: `${6*scale}px ${10*scale}px`, borderRadius: 8*scale, background: "rgba(0,0,0,0.35)", border: `1px solid ${fr.accent}55`, marginBottom: 8*scale }}>
          <div style={{ fontFamily: t.displayFont, fontWeight: 700, fontSize: 14*scale, lineHeight: 1.05, paddingRight: 6 }}>{card.title}</div>
          <div style={{ fontFamily: t.displayFont, fontWeight: 700, fontSize: 14*scale, background: fr.accent, color: t.bg[0], borderRadius: 999, minWidth: 22*scale, height: 22*scale, display: "flex", alignItems: "center", justifyContent: "center", padding: `0 ${6*scale}px` }}>{card.cost}</div>
        </div>
        <div style={{ position: "relative", flex: 1, minHeight: 0, borderRadius: 8*scale, overflow: "hidden", border: `1px solid ${fr.accent}88`, background: t.bg[0] }}>
          {loadingArt ? <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8, color: fr.accent, fontFamily: UI_FONT, fontSize: 11*scale }}><div className="ql-spin" style={{ width: 24, height: 24, borderColor: `${fr.accent}55`, borderTopColor: fr.accent }} />conjuring art…</div>
            : art ? <img src={art} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            : <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: `${fr.accent}99`, fontFamily: UI_FONT, fontSize: 11 }}>no art</div>}
        </div>
        <div style={{ marginTop: 7*scale, padding: `${3*scale}px ${9*scale}px`, borderRadius: 6*scale, background: "rgba(0,0,0,0.3)", fontFamily: t.displayFont, fontSize: 10*scale, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{card.typeLine}</span><span style={{ opacity: 0.7, marginLeft: 6 }}>{t.ornament}</span>
        </div>
        <div style={{ marginTop: 7*scale, padding: 9*scale, borderRadius: 8*scale, background: "rgba(0,0,0,0.28)", border: `1px solid ${fr.accent}33` }}>
          <div style={{ fontSize: 12*scale, lineHeight: 1.3 }}>{card.ability}</div>
          <div style={{ height: 1, background: `${fr.accent}33`, margin: `${6*scale}px 0` }} />
          <div style={{ fontStyle: "italic", fontSize: 11*scale, opacity: 0.82, lineHeight: 1.25 }}>“{card.flavor}”</div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6*scale }}>
          <span style={{ fontFamily: UI_FONT, fontSize: 10*scale, opacity: 0.6 }}>{card.realName}</span>
          <div style={{ fontFamily: t.displayFont, fontWeight: 700, fontSize: 14*scale, padding: `${3*scale}px ${11*scale}px`, borderRadius: 8*scale, background: fr.accent, color: t.bg[0] }}>{card.power}/{card.toughness}</div>
        </div>
      </div>
    </div>
    {flipped && (onRegenLore || onRegenArt) && <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
      {onRegenArt && <button onClick={onRegenArt} disabled={busy} style={refineBtn(fr, busy)}>↻ Art</button>}
      {onRegenLore && <button onClick={onRegenLore} disabled={busy} style={refineBtn(fr, busy)}>↻ Lore</button>}
    </div>}
  </div>;
}
function refineBtn(fr, busy) { return { flex: 1, fontFamily: UI_FONT, fontSize: 12, fontWeight: 500, padding: "7px 8px", borderRadius: 7, cursor: busy?"wait":"pointer", color: "#e8e8f0", background: "rgba(0,0,0,0.4)", border: `1px solid ${fr.accent}66`, opacity: busy?0.5:1 }; }

function FloatingCards() {
  const items = [{l:"8%",t:"18%",r:"-12deg",d:"0s",c:"#c9a227"},{l:"82%",t:"22%",r:"10deg",d:".6s",c:"#56c4ef"},{l:"14%",t:"62%",r:"8deg",d:"1.1s",c:"#ef5b6b"},{l:"78%",t:"64%",r:"-9deg",d:"1.6s",c:"#b15bef"}];
  return <div style={{ position: "absolute", inset: 0, zIndex: 1, pointerEvents: "none" }}>
    {items.map((x,i) => <div key={i} style={{ position: "absolute", left: x.l, top: x.t, "--r": x.r, animation: `qlfloat 6s ease-in-out ${x.d} infinite`, width: 96, height: 134, borderRadius: 10, background: `linear-gradient(160deg, ${x.c}33, #0a0a14)`, border: `1.5px solid ${x.c}88`, boxShadow: "0 20px 40px rgba(0,0,0,0.5)", opacity: 0.7 }}>
      <div style={{ margin: 8, height: 64, borderRadius: 6, background: `${x.c}22`, border: `1px solid ${x.c}55` }} />
      <div style={{ margin: "0 8px", height: 6, borderRadius: 3, background: `${x.c}55` }} />
      <div style={{ margin: "6px 8px", height: 6, width: "60%", borderRadius: 3, background: `${x.c}33` }} />
    </div>)}
  </div>;
}

function Panel({ title, sub, children }) {
  return <div className="ql-fade" style={{ maxWidth: 660, margin: "0 auto", background: "rgba(255,255,255,0.025)", border: "1px solid #2c2c36", borderRadius: 20, padding: "30px 30px 26px", boxShadow: "0 30px 60px rgba(0,0,0,0.35)" }}>
    <h2 style={{ fontFamily: DISPLAY_FONT, fontSize: 26, margin: "0 0 4px", color: "#e8e8f0" }}>{title}</h2>
    {sub && <p style={{ color: "#9a9aa8", fontSize: 14, margin: "0 0 22px" }}>{sub}</p>}
    {children}
  </div>;
}
function grid(c) { return { display: "grid", gridTemplateColumns: `repeat(${c}, 1fr)`, gap: 14 }; }
function SelectCard({ active, onClick, icon, title, hint }) {
  return <button onClick={onClick} className="ql-fade" style={{ textAlign: "left", cursor: "pointer", borderRadius: 14, padding: 18, border: `1.5px solid ${active?"#f3cf5b":"#33333e"}`, background: active?"rgba(243,207,91,0.08)":"rgba(255,255,255,0.02)", color: "#e8e8f0" }}>
    <div style={{ fontSize: 26, color: active?"#f3cf5b":"#c8c8d4", marginBottom: 8 }}>{icon}</div>
    <div style={{ fontFamily: DISPLAY_FONT, fontSize: 17, fontWeight: 600 }}>{title}</div>
    <div style={{ color: "#9a9aa8", fontSize: 13, marginTop: 3 }}>{hint}</div>
  </button>;
}
function NavRow({ onBack, onNext, nextOk, nextLabel = "Continue →" }) {
  return <div style={{ display: "flex", justifyContent: "space-between", marginTop: 26, gap: 12 }}>
    {onBack ? <GhostButton onClick={onBack}>← Back</GhostButton> : <span />}
    <PrimaryButton onClick={onNext} disabled={!nextOk}>{nextLabel}</PrimaryButton>
  </div>;
}
function SectionLabel({ children }) { return <div style={{ fontSize: 12, letterSpacing: 2, textTransform: "uppercase", color: "#d8b24a", marginBottom: 4 }}>{children}</div>; }
function QuestBanner({ q, t }) {
  return <div style={{ borderRadius: 16, padding: "22px 26px", background: `linear-gradient(135deg, ${t.accent}22, rgba(177,91,239,0.08))`, border: `1px solid ${t.accent}55` }}>
    <div style={{ fontFamily: t.displayFont, fontSize: 22, fontWeight: 700, color: t.accent }}>{q.title}</div>
    <div style={{ fontSize: 12, letterSpacing: 1, textTransform: "uppercase", color: "#9a9aa8", margin: "2px 0 12px" }}>{q.typeLine}</div>
    <div style={{ fontSize: 15, lineHeight: 1.5, marginBottom: 10, color: "#e8e8f0" }}>{q.ability}</div>
    <div style={{ fontStyle: "italic", color: "#c8c8d4", fontSize: 14 }}>“{q.flavor}”</div>
  </div>;
}
function BigLoader({ label }) {
  return <div style={{ textAlign: "center", padding: "60px 20px" }}>
    <div className="ql-spin" style={{ width: 48, height: 48, margin: "0 auto 20px", borderColor: "#d8b24a44", borderTopColor: "#f3cf5b" }} />
    <div style={{ fontFamily: DISPLAY_FONT, fontSize: 20, color: "#f3cf5b" }}>{label}</div>
    <div style={{ fontSize: 13, color: "#7a7a88", marginTop: 8 }}>A few seconds of magic.</div>
  </div>;
}

// --------- APP ---------
function Side Quest() {
  const [landing, setLanding] = useState(true);
  const [step, setStep] = useState(0);
  const [eventType, setEventType] = useState(null);
  const [theme, setTheme] = useState(null);
  const [questPrompt, setQuestPrompt] = useState("");
  const [participants, setParticipants] = useState([]);
  const [questCard, setQuestCard] = useState(null);
  const [cards, setCards] = useState([]);
  const [arts, setArts] = useState({});
  const [loadingArt, setLoadingArt] = useState({});
  const [flipped, setFlipped] = useState({});
  const [genState, setGenState] = useState("idle");
  const [busyCard, setBusyCard] = useState(null);
  const themeObj = THEMES.find((t) => t.id === theme) || THEMES[1];

  function addParticipant() { setParticipants((p) => [...p, { id: Date.now()+Math.random(), name: "", photo: null }]); }
  function updateParticipant(id, patch) { setParticipants((p) => p.map((x) => x.id===id ? {...x,...patch} : x)); }
  function removeParticipant(id) { setParticipants((p) => p.filter((x) => x.id!==id)); }
  function onPhoto(id, file) { const rd = new FileReader(); rd.onload = () => updateParticipant(id, { photo: rd.result }); rd.readAsDataURL(file); }

  function loadDemo() { setEventType(DEMO.eventType); setTheme(DEMO.theme); setQuestPrompt(DEMO.questPrompt); setParticipants(DEMO.participants.map((p) => ({...p}))); setLanding(false); setTimeout(() => runGeneration(DEMO), 50); }

  async function runGeneration(override) {
    const src = override || { eventType, theme, questPrompt, participants };
    setGenState("lore"); setStep(4); setFlipped({});
    const lore = await generateDeckLore(src);
    setQuestCard(lore.questCard);
    const ordered = lore.cards || [];
    setCards(ordered); setGenState("art");
    const th = THEMES.find((t) => t.id === src.theme) || THEMES[1];
    for (let i = 0; i < ordered.length; i++) {
      const c = ordered[i];
      const part = src.participants.find((p) => (p.name||"Hero") === c.realName);
      setLoadingArt((s) => ({...s, [c.realName]: true}));
      const frAccent = (CARD_FRAMES.find((f) => f.key===c.frame)||CARD_FRAMES[0]).accent;
      const art = await generateCardArt({ photoBase64: part?.photo||null, frameAccent: frAccent, themeStyle: th.style, seedStr: c.realName+c.title });
      setArts((s) => ({...s, [c.realName]: art}));
      setLoadingArt((s) => ({...s, [c.realName]: false}));
      setTimeout(() => setFlipped((s) => ({...s, [c.realName]: true})), 250 + i*320);
    }
    setGenState("done");
  }

  async function regenLore(realName) {
    setBusyCard(realName);
    const card = cards.find((c) => c.realName===realName);
    const fresh = await generateDeckLore({ eventType, theme, questPrompt, participants: [{ name: realName }] });
    const nc = fresh.cards[0];
    setCards((cs) => cs.map((c) => c.realName===realName ? {...c, ...nc, realName} : c));
    setBusyCard(null);
  }
  async function regenArt(realName) {
    setBusyCard(realName); setLoadingArt((s) => ({...s, [realName]: true}));
    const card = cards.find((c) => c.realName===realName);
    const part = participants.find((p) => (p.name||"Hero")===realName);
    const frAccent = (CARD_FRAMES.find((f) => f.key===card.frame)||CARD_FRAMES[0]).accent;
    const art = await generateCardArt({ photoBase64: part?.photo||null, frameAccent: frAccent, themeStyle: themeObj.style, seedStr: realName+card.title+Math.random() });
    setArts((s) => ({...s, [realName]: art})); setLoadingArt((s) => ({...s, [realName]: false})); setBusyCard(null);
  }

  const canNext = { 0: !!eventType, 1: !!theme, 2: questPrompt.trim().length > 8, 3: participants.length > 0 && participants.every((p) => p.name.trim()) };

  if (landing) {
    return <div style={{ minHeight: "100vh", background: "radial-gradient(1200px 700px at 50% -5%, #2a1d3f 0%, #15121d 45%, #08070d 100%)", color: "#e8e8f0", fontFamily: UI_FONT, position: "relative", overflow: "hidden" }}>
      <FloatingCards />
      <div style={{ position: "relative", zIndex: 2, maxWidth: 820, margin: "0 auto", padding: "120px 24px 80px", textAlign: "center" }}>
        <div className="ql-fade" style={{ fontFamily: DISPLAY_FONT, fontSize: 13, letterSpacing: 8, textTransform: "uppercase", color: "#d8b24a", marginBottom: 18 }}>✦ Side Quest ✦</div>
        <h1 className="ql-fade" style={{ fontFamily: DISPLAY_FONT, fontWeight: 700, fontSize: "clamp(36px,7vw,72px)", lineHeight: 1.05, margin: "0 0 22px", background: "linear-gradient(180deg,#fff,#cda955)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", animationDelay: ".1s" }}>Every event<br/>deserves a deck.</h1>
        <p className="ql-fade" style={{ color: "#b8b8c8", fontSize: "clamp(16px,2.4vw,20px)", maxWidth: 560, margin: "0 auto 38px", lineHeight: 1.6, animationDelay: ".2s" }}>Side Quest turns any bachelor party, trip, or night out into a playable card game — starring your actual crew. AI writes the lore, paints the portraits, and we ship the real, physical deck.</p>
        <div className="ql-fade" style={{ display: "flex", flexDirection: "column", gap: 14, alignItems: "center", animationDelay: ".3s" }}>
          <PrimaryButton onClick={() => setLanding(false)} style={{ fontSize: 18, padding: "18px 44px" }}>Build your deck →</PrimaryButton>
          <button onClick={loadDemo} style={{ background: "none", border: "none", cursor: "pointer", color: "#6c6c7c", fontFamily: UI_FONT, fontSize: 13, textDecoration: "underline", textUnderlineOffset: 3 }}>or skip to a sample deck</button>
        </div>
        <div className="ql-fade" style={{ marginTop: 56, display: "flex", gap: 30, justifyContent: "center", flexWrap: "wrap", color: "#7a7a88", fontSize: 13, animationDelay: ".4s" }}>
          {["Born at a real bachelor party","Lore by AI","Custom portraits","Shipped to your door"].map((x) => <span key={x} style={{ display: "flex", alignItems: "center", gap: 7 }}><span style={{ color: "#d8b24a" }}>◆</span>{x}</span>)}
        </div>
      </div>
    </div>;
  }

  return <div style={{ minHeight: "100vh", background: `radial-gradient(1200px 600px at 50% -10%, ${themeObj.bg[1]} 0%, #14121c 50%, #0a090f 100%)`, color: "#e8e8f0", fontFamily: UI_FONT, padding: "0 0 80px" }}>
    <div style={{ textAlign: "center", padding: "30px 20px 10px" }}>
      <div onClick={() => setLanding(true)} style={{ cursor: "pointer", fontFamily: DISPLAY_FONT, fontSize: 13, letterSpacing: 7, textTransform: "uppercase", color: "#d8b24a", marginBottom: 18 }}>✦ Side Quest ✦</div>
      <Stepper step={step} />
    </div>
    <div style={{ maxWidth: 1040, margin: "0 auto", padding: "26px 20px 0" }}>
      {step === 0 && <Panel title="What's the occasion?" sub="Pick the kind of event you're building for.">
        <div style={grid(2)}>{EVENT_TYPES.map((e) => <SelectCard key={e.id} active={eventType===e.id} onClick={() => setEventType(e.id)} icon={e.icon} title={e.label} hint={e.hint} />)}</div>
        <NavRow onNext={() => setStep(1)} nextOk={canNext[0]} />
      </Panel>}
      {step === 1 && <Panel title="Choose a world" sub="The lore, the fonts, and the card style all adapt to this.">
        <div style={grid(3)}>{THEMES.map((t) => <button key={t.id} onClick={() => setTheme(t.id)} className="ql-fade" style={{ textAlign: "left", cursor: "pointer", borderRadius: 14, padding: 16, border: `1.5px solid ${theme===t.id?"#f3cf5b":"#33333e"}`, background: theme===t.id?"rgba(243,207,91,0.08)":"rgba(255,255,255,0.02)" }}>
          <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>{t.swatch.map((c,i) => <div key={i} style={{ width: 26, height: 26, borderRadius: 6, background: c, border: "1px solid rgba(255,255,255,0.1)" }} />)}</div>
          <div style={{ fontFamily: t.displayFont, fontSize: 18, fontWeight: 700, color: t.accent }}>{t.label}</div>
          <div style={{ color: "#9a9aa8", fontSize: 13, marginTop: 2 }}>{t.sub}</div>
        </button>)}</div>
        <NavRow onBack={() => setStep(0)} onNext={() => setStep(2)} nextOk={canNext[1]} />
      </Panel>}
      {step === 2 && <Panel title="Describe the quest" sub="The goal, the vibe, the inside jokes. AI turns this into your deck's lore.">
        <textarea value={questPrompt} onChange={(e) => setQuestPrompt(e.target.value)} rows={6} placeholder="e.g. Dave's bachelor party in Lisbon. Complete dares across the city to 'earn back' his freedom before the wedding. He fears seagulls and loves bad karaoke." style={{...inputStyle, resize: "vertical", lineHeight: 1.5}} />
        <div style={{ fontSize: 12, color: "#7a7a88", marginTop: 8 }}>Tip: name the guest of honor, the place, and a couple personal details for sharper cards.</div>
        <NavRow onBack={() => setStep(1)} onNext={() => setStep(3)} nextOk={canNext[2]} />
      </Panel>}
      {step === 3 && <Panel title="Add your cast" sub="Each person becomes a card. Add a name and a photo.">
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>{participants.map((p) => <div key={p.id} className="ql-fade" style={{ display: "flex", gap: 12, alignItems: "center", padding: 12, borderRadius: 12, border: "1px solid #33333e", background: "rgba(255,255,255,0.02)" }}>
          <label style={{ width: 56, height: 56, borderRadius: 10, flexShrink: 0, overflow: "hidden", cursor: "pointer", border: "1px dashed #555", display: "flex", alignItems: "center", justifyContent: "center", background: p.photo?"transparent":"rgba(255,255,255,0.03)" }}>
            {p.photo ? <img src={p.photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ color: "#777", fontSize: 22 }}>＋</span>}
            <input type="file" accept="image/*" style={{ display: "none" }} onChange={(e) => e.target.files[0] && onPhoto(p.id, e.target.files[0])} />
          </label>
          <input value={p.name} onChange={(e) => updateParticipant(p.id, { name: e.target.value })} placeholder="Name" style={{...inputStyle, flex: 1, margin: 0}} />
          <button onClick={() => removeParticipant(p.id)} style={{ background: "none", border: "none", color: "#888", cursor: "pointer", fontSize: 20 }}>✕</button>
        </div>)}</div>
        <GhostButton onClick={addParticipant} style={{ marginTop: 14, width: "100%" }}>＋ Add participant</GhostButton>
        <NavRow onBack={() => setStep(2)} onNext={() => runGeneration()} nextOk={canNext[3]} nextLabel="✦ Generate deck" />
      </Panel>}
      {step === 4 && <div>
        {genState === "lore" && <BigLoader label="Writing your deck's lore…" />}
        {(genState === "art" || genState === "done") && <>
          {questCard && <div className="ql-fade" style={{ marginBottom: 28 }}><SectionLabel>The Quest</SectionLabel><QuestBanner q={questCard} t={themeObj} /></div>}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
            <SectionLabel>{genState==="art" ? "Dealing your deck…" : "Your deck — tap a card to flip, refine below"}</SectionLabel>
            {genState === "done" && <PrimaryButton onClick={() => setStep(5)}>Order deck →</PrimaryButton>}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(232px, 1fr))", gap: 26, justifyItems: "center", marginTop: 18 }}>
            {cards.map((c) => <div key={c.realName} className="ql-pop"><GameCard card={c} theme={themeObj} art={arts[c.realName]} loadingArt={loadingArt[c.realName]} flipped={!!flipped[c.realName]} onFlip={() => setFlipped((s) => ({...s, [c.realName]: !s[c.realName]}))} busy={busyCard===c.realName} onRegenLore={() => regenLore(c.realName)} onRegenArt={() => regenArt(c.realName)} /></div>)}
          </div>
        </>}
      </div>}
      {step === 5 && <Panel title="Ship the real thing" sub="Premium card stock, full-bleed art, custom tuck box.">
        <div style={{ display: "flex", gap: 30, flexWrap: "wrap", alignItems: "center", justifyContent: "center" }}>
          <div style={{ display: "flex" }}>{cards.slice(0,3).map((c,i) => <div key={c.realName} style={{ transform: `rotate(${(i-1)*8}deg) translateX(${(i-1)*-26}px)`, zIndex: i }}><GameCard card={c} theme={themeObj} art={arts[c.realName]} flipped onFlip={()=>{}} /></div>)}</div>
          <div style={{ minWidth: 260 }}>
            <div style={{ fontFamily: DISPLAY_FONT, fontSize: 24, marginBottom: 6 }}>{cards.length}-card custom deck</div>
            <div style={{ color: "#a8a8b8", marginBottom: 16 }}>Linen finish, full bleed, tuck box.</div>
            <div style={{ fontFamily: DISPLAY_FONT, fontSize: 32, color: "#f3cf5b", marginBottom: 16 }}>$39<span style={{ fontSize: 16, color: "#a8a8b8" }}> + shipping</span></div>
            <PrimaryButton onClick={() => alert("In production this opens Stripe checkout → print-on-demand fulfillment (see backend spec).")} style={{ width: "100%" }}>Order physical deck</PrimaryButton>
            <GhostButton onClick={() => setStep(4)} style={{ width: "100%", marginTop: 10 }}>← Back to deck</GhostButton>
          </div>
        </div>
      </Panel>}
    </div>
    <div style={{ textAlign: "center", marginTop: 50, color: "#55555f", fontSize: 12 }}>Side Quest · standalone demo build</div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Side Quest />);
</script>
</body>
</html>
